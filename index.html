        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vi;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid #334155;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: white;
            font-weight: bold;
            border: 4px solid #475569;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .title {
            color: #3b82f6;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .bio {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease-in-out;
        }

        /* Platform Custom Colors */
        .linkedin {
            background: #0077b5;
            color: white;
        }
        .linkedin:hover { background: #006297; transform: translateY(-2px); }

        .github {
            background: #24292e;
            color: white;
            border: 1px solid #475569;
        }
        .github:hover { background: #1a1e22; transform: translateY(-2px); }

        .whatsapp {
            background: #25d366;
            color: white;
        }

        .email {
            background: #ea4335;
            color: white;
        }
        .email:hover { background: #d3382b; transform: translateY(-2px); }

        footer {
